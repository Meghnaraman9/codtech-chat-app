<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Central perk</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0d;
      --surface: #161616;
      --surface2: #1f1f1f;
      --border: #2a2a2a;
      --accent: #ff5c35;
      --accent2: #ff8c6b;
      --text: #f0ede8;
      --muted: #666;
      --online: #4ade80;
      --radius: 16px;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* ── LOGIN SCREEN ── */
    #login-screen {
      position: fixed; inset: 0;
      background: var(--bg);
      display: flex; align-items: center; justify-content: center;
      z-index: 100;
      animation: fadeIn .4s ease;
    }
    .login-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 48px 40px;
      width: 360px;
      text-align: center;
    }
    .login-logo {
      font-family: 'Syne', sans-serif;
      font-size: 2rem;
      font-weight: 800;
      color: var(--accent);
      margin-bottom: 8px;
      letter-spacing: -1px;
    }
    .login-sub { color: var(--muted); font-size: .875rem; margin-bottom: 36px; }
    .login-card input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 18px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      outline: none;
      margin-bottom: 16px;
      transition: border-color .2s;
    }
    .login-card input:focus { border-color: var(--accent); }
    .login-card input::placeholder { color: var(--muted); }
    .btn-join {
      width: 100%;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 12px;
      padding: 14px;
      font-family: 'Syne', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: background .2s, transform .1s;
    }
    .btn-join:hover { background: var(--accent2); transform: translateY(-1px); }
    .btn-join:active { transform: translateY(0); }

    /* ── MAIN LAYOUT ── */
    #app {
      display: none;
      width: 100vw;
      height: 100dvh;
      grid-template-columns: 260px 1fr;
      grid-template-rows: 1fr;
    }
    #app.visible { display: grid; }

    /* ── SIDEBAR ── */
    .sidebar {
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .sidebar-header {
      padding: 24px 20px 16px;
      border-bottom: 1px solid var(--border);
    }
    .sidebar-title {
      font-family: 'Syne', sans-serif;
      font-size: 1.4rem;
      font-weight: 800;
      color: var(--accent);
      letter-spacing: -0.5px;
    }
    .sidebar-sub { font-size: .75rem; color: var(--muted); margin-top: 2px; }
    .user-section { padding: 16px 20px; }
    .user-section-label {
      font-size: .65rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--muted);
      margin-bottom: 12px;
    }
    #user-list { list-style: none; display: flex; flex-direction: column; gap: 6px; }
    #user-list li {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 10px;
      border-radius: 10px;
      font-size: .875rem;
      background: var(--surface2);
    }
    .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--online); flex-shrink: 0;
      box-shadow: 0 0 6px var(--online);
    }
    .me-badge {
      margin-left: auto;
      font-size: .65rem;
      background: var(--accent);
      color: #fff;
      padding: 2px 6px;
      border-radius: 6px;
      font-weight: 600;
    }
    .sidebar-footer {
      margin-top: auto;
      padding: 16px 20px;
      border-top: 1px solid var(--border);
      font-size: .75rem;
      color: var(--muted);
    }

    /* ── CHAT AREA ── */
    .chat-area {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .chat-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 28px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }
    .chat-header-left { display: flex; flex-direction: column; }
    .chat-header-title {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 1.05rem;
    }
    .chat-header-sub { font-size: .75rem; color: var(--muted); }
    .connected-badge {
      display: flex; align-items: center; gap: 6px;
      font-size: .75rem;
      background: rgba(74,222,128,.08);
      border: 1px solid rgba(74,222,128,.2);
      color: var(--online);
      padding: 5px 12px;
      border-radius: 20px;
    }
    .connected-badge .dot { width: 6px; height: 6px; animation: pulse 2s infinite; }
    @keyframes pulse {
      0%,100% { opacity: 1; } 50% { opacity: .4; }
    }

    /* ── MESSAGES ── */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px 28px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      scroll-behavior: smooth;
    }
    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .msg-group { display: flex; flex-direction: column; gap: 2px; margin-bottom: 12px; }
    .msg-meta {
      display: flex; align-items: baseline; gap: 8px;
      font-size: .75rem;
      color: var(--muted);
      padding: 0 4px;
      margin-bottom: 4px;
    }
    .msg-meta .name { font-weight: 600; color: var(--text); font-size: .8rem; }
    .msg-bubble {
      display: inline-block;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 4px 16px 16px 16px;
      padding: 10px 16px;
      font-size: .9rem;
      line-height: 1.5;
      max-width: 70%;
      word-break: break-word;
      animation: slideUp .2s ease;
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .msg-group.mine { align-items: flex-end; }
    .msg-group.mine .msg-meta { flex-direction: row-reverse; }
    .msg-group.mine .msg-bubble {
      background: var(--accent);
      border-color: var(--accent);
      border-radius: 16px 4px 16px 16px;
      color: #fff;
    }

    .system-msg {
      text-align: center;
      font-size: .75rem;
      color: var(--muted);
      padding: 6px 0;
      animation: fadeIn .3s ease;
    }

    /* ── TYPING ── */
    #typing-indicator {
      height: 24px;
      padding: 0 28px;
      font-size: .75rem;
      color: var(--accent2);
      font-style: italic;
      display: flex; align-items: center; gap: 6px;
    }
    .typing-dots span {
      display: inline-block;
      width: 4px; height: 4px;
      border-radius: 50%;
      background: var(--accent2);
      animation: bounce 1.2s infinite;
    }
    .typing-dots span:nth-child(2) { animation-delay: .2s; }
    .typing-dots span:nth-child(3) { animation-delay: .4s; }
    @keyframes bounce {
      0%,60%,100% { transform: translateY(0); }
      30% { transform: translateY(-4px); }
    }

    /* ── INPUT ── */
    .input-area {
      padding: 16px 28px 20px;
      border-top: 1px solid var(--border);
      display: flex; gap: 12px; align-items: flex-end;
    }
    #message-input {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 13px 18px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: .9rem;
      outline: none;
      resize: none;
      max-height: 120px;
      transition: border-color .2s;
      line-height: 1.5;
    }
    #message-input:focus { border-color: var(--accent); }
    #message-input::placeholder { color: var(--muted); }
    #send-btn {
      background: var(--accent);
      border: none;
      border-radius: 12px;
      width: 48px; height: 48px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      transition: background .2s, transform .1s;
    }
    #send-btn:hover { background: var(--accent2); transform: translateY(-1px); }
    #send-btn svg { width: 20px; height: 20px; fill: #fff; }

    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    /* ── RESPONSIVE ── */
    @media (max-width: 600px) {
      #app.visible { grid-template-columns: 1fr; }
      .sidebar { display: none; }
    }
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">Central perk -Coffee House </div>
    <p class="login-sub">F.R.I.E.N.D.S</p>
    <input type="text" id="username-input" placeholder="Enter your username..." maxlength="20" autocomplete="off"/>
    <button class="btn-join" onclick="joinChat()">Join Chat →</button>
  </div>
</div>

<!-- MAIN APP -->
<div id="app">
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-title">💬 LiveChat</div>
      <div class="sidebar-sub">Real-time · Socket.io</div>
    </div>
    <div class="user-section">
      <div class="user-section-label">Online Now</div>
      <ul id="user-list"></ul>
    </div>
    <div class="sidebar-footer">CodTech Internship Task 2</div>
  </aside>

  <main class="chat-area">
    <div class="chat-header">
      <div class="chat-header-left">
        <span class="chat-header-title"># general</span>
        <span class="chat-header-sub" id="room-sub">Real-time chat room</span>
      </div>
      <div class="connected-badge">
        <div class="dot"></div>
        Connected
      </div>
    </div>

    <div id="messages"></div>

    <div id="typing-indicator"></div>

    <div class="input-area">
      <textarea id="message-input" placeholder="Type a message..." rows="1"></textarea>
      <button id="send-btn" onclick="sendMessage()">
        <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>
  </main>
</div>

<script>
  const socket = io('https://codtech-chat-app-1.onrender.com', { transports: ['websocket', 'polling'] });
  let myUsername = '';
  let typingTimer;
  let isTyping = false;
  let typingUsers = {};

  // Auto-resize textarea
  const input = document.getElementById('message-input');
  input.addEventListener('input', () => {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 120) + 'px';
    handleTyping();
  });
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });

  function joinChat() {
    const val = document.getElementById('username-input').value.trim();
    if (!val) { document.getElementById('username-input').focus(); return; }
    myUsername = val;
    socket.emit('join', myUsername);
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').classList.add('visible');
    document.getElementById('room-sub').textContent = `Logged in as ${myUsername}`;
    input.focus();
  }

  document.getElementById('username-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') joinChat();
  });

  function sendMessage() {
    const text = input.value.trim();
    if (!text) return;
    socket.emit('send-message', { text });
    input.value = '';
    input.style.height = 'auto';
    socket.emit('typing', false);
    isTyping = false;
  }

  function handleTyping() {
    if (!isTyping) { isTyping = true; socket.emit('typing', true); }
    clearTimeout(typingTimer);
    typingTimer = setTimeout(() => { isTyping = false; socket.emit('typing', false); }, 1500);
  }

  // ── Socket Events ──
  socket.on('receive-message', (msg) => {
    appendMessage(msg);
  });

  socket.on('user-joined', ({ username }) => {
    appendSystem(`${username} joined the chat`);
  });

  socket.on('user-left', ({ username }) => {
    if (username) appendSystem(`${username} left the chat`);
  });

  socket.on('user-list', (users) => {
    const ul = document.getElementById('user-list');
    ul.innerHTML = users.map(u => `
      <li>
        <span class="dot"></span>
        <span>${u}</span>
        ${u === myUsername ? '<span class="me-badge">You</span>' : ''}
      </li>
    `).join('');
  });

  socket.on('user-typing', ({ username, isTyping }) => {
    if (isTyping) {
      typingUsers[username] = true;
    } else {
      delete typingUsers[username];
    }
    updateTypingIndicator();
  });

  function updateTypingIndicator() {
    const names = Object.keys(typingUsers);
    const el = document.getElementById('typing-indicator');
    if (names.length === 0) {
      el.innerHTML = '';
    } else {
      const label = names.length === 1 ? `${names[0]} is typing` : `${names.join(', ')} are typing`;
      el.innerHTML = `
        <div class="typing-dots"><span></span><span></span><span></span></div>
        ${label}
      `;
    }
  }

  function appendMessage(msg) {
    const messages = document.getElementById('messages');
    const isMine = msg.username === myUsername;
    const group = document.createElement('div');
    group.className = `msg-group ${isMine ? 'mine' : ''}`;
    group.innerHTML = `
      <div class="msg-meta">
        <span class="name">${msg.username}</span>
        <span>${msg.timestamp}</span>
      </div>
      <div class="msg-bubble">${escapeHtml(msg.text)}</div>
    `;
    messages.appendChild(group);
    messages.scrollTop = messages.scrollHeight;
  }

  function appendSystem(text) {
    const messages = document.getElementById('messages');
    const el = document.createElement('div');
    el.className = 'system-msg';
    el.textContent = `— ${text} —`;
    messages.appendChild(el);
    messages.scrollTop = messages.scrollHeight;
  }

  function escapeHtml(text) {
    return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
</script>
</body>
</html>
